apiVersion: apps/v1
kind: Deployment

metadata:
  name: mysql

spec:
  replicas: 1

  selector:
    matchLabels:
      app: mysql

  template:
    metadata:
      labels:
        app: mysql

    spec:
      containers:
      - name: mysql
        image: mysql:8

        ports:
        - containerPort: 3306

        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: gateway-secret
              key: DB_PASS

        - name: MYSQL_DATABASE
          value: "api_gateway_analytics"

        volumeMounts:
        - name: mysql-init-volume
          mountPath: /docker-entrypoint-initdb.d

      volumes:
      - name: mysql-init-volume
        configMap:
          name: mysql-init

---
apiVersion: v1
kind: Service

metadata:
  name: mysql

spec:
  selector:
    app: mysql

  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306