apiVersion: apps/v1
kind: Deployment

metadata:
  name: worker
  namespace: rate-limiter

spec:
  replicas: 1

  selector:
    matchLabels:
      app: worker

  template:
    metadata:
      labels:
        app: worker

    spec:
      containers:
      - name: worker
        image: rate-limiter-worker
        imagePullPolicy: Never

        env:
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: gateway-secret
              key: DB_USER

        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: gateway-secret
              key: DB_PASS

        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: gateway-config
              key: DB_HOST

        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: gateway-config
              key: DB_NAME

        - name: REDIS_ADDR
          valueFrom:
            configMapKeyRef:
              name: gateway-config
              key: REDIS_ADDR