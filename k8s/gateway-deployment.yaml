apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-deployment
  namespace: rate-limiter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: rate-limiter-gateway
        imagePullPolicy: Never

        ports:
        - containerPort: 8080

        envFrom:
        - secretRef:
            name: gateway-secret
        - configMapRef:
            name: gateway-config

        startupProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 5
          failureThreshold: 20

        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        
        # HPA
        resources:
          requests:
            cpu: "100m"
          limits:
            cpu: "500m"