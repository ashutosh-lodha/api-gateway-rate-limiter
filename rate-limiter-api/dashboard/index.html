<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>API Gateway Analytics</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:system-ui;
    background:#0f172a;
    color:white;
}

.header{
    padding:20px;
    font-size:26px;
    font-weight:bold;
    background:#020617;
    display:flex;
    justify-content:space-between;
}

.refresh{
    font-size:14px;
    color:#94a3b8;
}

.kpi-container{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    padding:20px;
}

.kpi{
    background:#020617;
    padding:20px;
    border-radius:10px;
}

.kpi h3{
    margin:0;
    font-size:14px;
    color:#94a3b8;
}

.kpi p{
    font-size:24px;
    margin:5px 0 0;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:20px;
    padding:20px;
}

.card{
    background:#020617;
    padding:20px;
    border-radius:10px;
}

canvas{
    width:100%;
    height:250px;
}
</style>
</head>

<body>

<div class="header">
API Gateway Dashboard
<div class="refresh">Auto refresh: 5s</div>
</div>

<div class="kpi-container">

<div class="kpi">
<h3>Total Requests</h3>
<p id="totalRequests">-</p>
</div>

<div class="kpi">
<h3>Blocked Requests</h3>
<p id="blockedRequests">-</p>
</div>

<div class="kpi">
<h3>Active Users</h3>
<p id="activeUsers">-</p>
</div>

<div class="kpi">
<h3>Top Endpoint</h3>
<p id="topEndpoint">-</p>
</div>

</div>

<div class="grid">

<div class="card">
<h3>Top Users</h3>
<canvas id="usersChart"></canvas>
</div>

<div class="card">
<h3>Top Endpoints</h3>
<canvas id="endpointsChart"></canvas>
</div>

<div class="card">
<h3>Blocked Requests</h3>
<canvas id="blockedChart"></canvas>
</div>

</div>

<script>

let usersChart, endpointsChart, blockedChart

async function fetchData(url){
    const res = await fetch(url)
    return res.json()
}

async function loadDashboard(){

    const users = await fetchData("/analytics/top-users")
    const endpoints = await fetchData("/analytics/top-endpoints")
    const blocked = await fetchData("/analytics/blocked-requests")

    // KPI calculations
    let totalRequests = users.reduce((sum,u)=>sum+u.total_requests,0)
    let totalBlocked = blocked.reduce((sum,b)=>sum+b.blocked_requests,0)

    document.getElementById("totalRequests").innerText = totalRequests
    document.getElementById("blockedRequests").innerText = totalBlocked
    document.getElementById("activeUsers").innerText = users.length
    document.getElementById("topEndpoint").innerText = endpoints[0]?.endpoint || "-"

    // Charts
    const userLabels = users.map(u => u.api_key)
    const userData = users.map(u => u.total_requests)

    const endpointLabels = endpoints.map(e => e.endpoint)
    const endpointData = endpoints.map(e => e.total_requests)

    const blockedLabels = blocked.map(b => b.api_key)
    const blockedData = blocked.map(b => b.blocked_requests)

    if(usersChart) usersChart.destroy()
    if(endpointsChart) endpointsChart.destroy()
    if(blockedChart) blockedChart.destroy()

    usersChart = new Chart(usersChartCanvas, {
        type:"bar",
        data:{labels:userLabels,datasets:[{label:"Requests",data:userData}]}
    })

    endpointsChart = new Chart(endpointsChartCanvas, {
        type:"bar",
        data:{labels:endpointLabels,datasets:[{label:"Requests",data:endpointData}]}
    })

    blockedChart = new Chart(blockedChartCanvas, {
        type:"bar",
        data:{labels:blockedLabels,datasets:[{label:"Blocked",data:blockedData}]}
    })

}

const usersChartCanvas = document.getElementById("usersChart")
const endpointsChartCanvas = document.getElementById("endpointsChart")
const blockedChartCanvas = document.getElementById("blockedChart")

loadDashboard()
setInterval(loadDashboard,5000)

</script>

</body>
</html>
