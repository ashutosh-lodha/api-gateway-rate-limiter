apiVersion: apps/v1
kind: Deployment

metadata:
  name: gateway-deployment

spec:
  replicas: 3

  selector:
    matchLabels:
      app: gateway

  template:
    metadata:
      labels:
        app: gateway

    spec:
      containers:
      - name: gateway
        image: rate-limiter-gateway
        imagePullPolicy: Never

        ports:
        - containerPort: 8080

        env:
        - name: DB_USER
          value: "root"
        - name: DB_PASS
          value: "rootpassword"
        - name: DB_HOST
          value: "mysql:3306"
        - name: DB_NAME
          value: "api_gateway_analytics"
        - name: REDIS_ADDR
          value: "redis:6379"